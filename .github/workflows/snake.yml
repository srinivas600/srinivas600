name: Generate contribution games

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - scripts/**
      - .github/workflows/snake.yml

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Checkout hitmehard commits source
        uses: actions/checkout@v4
        with:
          repository: srinivas600/hitmehard
          path: hitmehard
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install generator dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate contribution graphs from hitmehard history
        working-directory: scripts
        env:
          HITMEHARD_PATH: ${{ github.workspace }}/hitmehard
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate

      - name: Commit updated graph SVGs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.svg
          git commit -m "Update contribution graph games" || exit 0
          git push
