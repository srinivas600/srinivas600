name: Generate contribution games

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - scripts/**
      - .github/workflows/snake.yml

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Checkout hitmehard commits source
        uses: actions/checkout@v4
        with:
          repository: srinivas600/hitmehard
          path: hitmehard
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate contribution graphs from hitmehard history
        working-directory: scripts
        env:
          HITMEHARD_PATH: ${{ github.workspace }}/hitmehard
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate

      - name: Commit updated graph SVGs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update contribution graph games"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            git push origin main && exit 0
            echo "Push failed (attempt $attempt), retrying..."
            sleep 3
          done
          exit 1
