name: Deploy River Crossing game

on:
  push:
    branches:
      - main
    paths:
      - river-crossing/**
      - .github/workflows/river-crossing-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: river-crossing-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site with river-crossing subdirectory
        run: |
          mkdir -p deploy/river-crossing
          cp -r river-crossing/* deploy/river-crossing/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - uses: actions/deploy-pages@v4
        id: deployment
